<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TaskFlow Mobile</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <!-- adding tasks to the task list -->
        <section>
            <form action="">
                <div class="form-row">
                    <div class="form-group flex-grow">
                        <label for="task">Task:</label>
                        <input type="text" id="task" name="task" placeholder="Writing task...">
                    </div>
                    <div class="form-group">
                        <label for="task-submit">&nbsp;</label>
                        <input type="submit" id="task-submit" value="Add task">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="5" placeholder="Add description..."></textarea>
                </div>

                <div class="form-group">
                    <label for="tags">Add Category:</label>
                    <input type="text" id="tags" name="tags" placeholder="Enter category...">
                </div>
            </form>
        </section>
        <!-- Search bar -->
        <section class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar tareas...">
                <button id="markAllCompleteBtn" class="mark-all-btn" title="Marcar todas como completadas">
                    ✓ Marcar todas
                </button>
                <button id="deleteCompletedBtn" class="delete-completed-btn" title="Eliminar todas las completadas">
                    🗑 Eliminar completadas
                </button>
            </div>
        </section>
        <!-- Task template -->
        <template id="taskTemplate">
            <li class="task-item">
                <input type="checkbox" class="task-checkbox">
                <div class="task-content">
                    <h3 class="task-title"></h3>
                    <p class="task-description"></p>
                </div>
                <span class="task-status"></span>
            </li>
        </template>
        <!-- Task list section -->
        <section class="tasks-list">
            <ul id="tasksList">
            </ul>
        </section>

    </main>
            <aside>
            <div class="filter-section">
                <p id="all-tasks-btn" class="filter-btn active">
                    All tasks
                    <span class="counter" id="all-tasks-count">0</span>
                </p>
                <p id="pending-tasks-btn" class="filter-btn">
                    Pending tasks
                    <span class="counter" id="pending-tasks-count">0</span>
                </p>
                <p id="completed-tasks-btn" class="filter-btn">
                    Completed tasks
                    <span class="counter" id="completed-tasks-count">0</span>
                </p>
            </div>
            <p class="categories-title">Categories</p>
            <ul id="categoriesList" class="categories-list">
                <li class="category-item" data-category="All">
                    All Categories
                </li>
                <li class="category-item" data-category="Work">
                    Work
                </li>
                <li class="category-item" data-category="Personal">
                    Personal
                </li>
                <li class="category-item" data-category="Shopping">
                    Shopping
                </li>
            </ul>
        </aside>
    <footer>
        <!-- <p>&copy; 2024 Your Company. All rights reserved.</p> -->
    </footer>
    <script src="app.js"></script>
</body>
</html>
